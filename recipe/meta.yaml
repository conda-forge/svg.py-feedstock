{% set version = "1.7.0" %}

package:
  name: svg.py
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/s/svg.py/svg_py-{{ version }}.tar.gz
  sha256: 4bcafb4dc20de27449fc868ba046dacab104573c4d6e07947bf744131bcb4968

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - flit-core >=2,<4
    - pip
    - python {{ python_min }}
  run:
    - python >={{ python_min }}

test:
  imports:
    - svg
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/orsinium-labs/svg
  summary: SVG drawing library
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - thewchan
